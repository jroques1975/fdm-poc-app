services:
  app:
    image: ${IMAGE:-ghcr.io/jroques1975/fdm-poc-app:latest}
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - /opt/apps/poc-app/env/.env
    depends_on:
      db:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: poc_app_dev
      POSTGRES_USER: poc_app_user
      POSTGRES_PASSWORD: dev_password_only
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U poc_app_user -d poc_app_dev"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  pgdata:
