services:
  app:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: poc_app_prod
      POSTGRES_USER: poc_app_user
      POSTGRES_PASSWORD: change_this_now
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U poc_app_user -d poc_app_prod"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
